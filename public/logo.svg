<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer Diamond Shape -->
  <rect x="25" y="25" width="50" height="50" fill="none" stroke="#16a34a" stroke-width="4" transform="rotate(45 50 50)" rx="2"/>
  
  <!-- Internal Arch Elements -->
  <g transform="translate(50, 50) rotate(-45)">
    <!-- Light Green Arch -->
    <path 
      d="M -20 20 A 25 25 0 0 1 20 20" 
      fill="none" 
      stroke="#4ade80" 
      stroke-width="8" 
      stroke-linecap="round"
      transform="translate(0, -10)"
    />
    <!-- Darker Green Arch -->
    <path 
      d="M -10 20 A 15 15 0 0 1 10 20" 
      fill="none" 
      stroke="#15803d" 
      stroke-width="8" 
      stroke-linecap="round"
      transform="translate(0, -5)"
    />
  </g>
</svg>
